name: openclaw-polymarket-v0_4
description: >
  v0.4 authorization-first Polymarket workflow: scan markets, fetch contexts,
  cluster events, build memos, generate proposals, apply risk plus authorization,
  execute the authorized queue, then refresh positions and generate a position report.
  Human Telegram approval remains available as a separate operator path for proposals
  that stay in pending_approval.

env:
  POLYMARKET_MVP_STATE_DIR: ./var
  POLYMARKET_MVP_DB_PATH: ./var/polymarket_mvp.sqlite3

steps:
  - id: init_db
    name: Initialize Or Migrate SQLite
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.db_init

  - id: scan_markets
    name: Scan Polymarket
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.poly_scanner
      --min-liquidity 10000
      --max-expiry-days 7
      --output artifacts/markets.json

  - id: fetch_event_contexts
    name: Fetch External Context
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.event_fetcher
      --market-file artifacts/markets.json
      --output artifacts/contexts.json

  - id: cluster_events
    name: Cluster Events
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.cluster_events
      --market-file artifacts/markets.json
      --output artifacts/clusters.json

  - id: build_memos
    name: Build Research Memos
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.build_memos
      --market-file artifacts/markets.json
      --output artifacts/memos.json

  - id: generate_proposals
    name: Generate Proposals
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.proposer
      --market-file artifacts/markets.json
      --context-file artifacts/contexts.json
      --engine heuristic
      --size-usdc 5
      --top 3
      --max-slippage-bps 500
      --output artifacts/proposals.json

  - id: apply_risk_and_authorization
    name: Apply Risk And Authorization
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.risk_engine
      --proposal-file artifacts/proposals.json
      --output artifacts/risk.json

  - id: execute_authorized_queue
    name: Execute Authorized Queue
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.poly_executor
      --source authorized_queue
      --mode mock
      --output artifacts/authorized-execution.json

  - id: refresh_positions
    name: Refresh Positions
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.update_positions
      --output artifacts/positions.json

  - id: position_report
    name: Position Report
    command: >
      PYTHONPATH=src python3 -m polymarket_mvp.position_report
      --output artifacts/position-report.json
